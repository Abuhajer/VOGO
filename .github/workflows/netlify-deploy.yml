name: Deploy Netlify

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: netlify-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Netlify CLI
        run: npm install -g netlify-cli@23.12.3

      - name: Build on Netlify (Linux — sharp + Next.js functions)
        run: netlify build
        env:
          NETLIFY: "true"
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: f3a2ce01-8f8c-4bf5-9c4d-1126509a682a
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NETLIFY_DATABASE_URL: ${{ secrets.NETLIFY_DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_IMAGE_MODEL: ${{ secrets.GEMINI_IMAGE_MODEL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      - name: Deploy to Netlify
        run: netlify deploy --prod --no-build
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: f3a2ce01-8f8c-4bf5-9c4d-1126509a682a
