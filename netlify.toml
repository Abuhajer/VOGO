[build]
  command = "node scripts/netlify-build.mjs"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["sharp", "@prisma/client"]

[functions."*"]
  # Try-on (Gemini + sharp normalize) can exceed the default 10s on cold start.
  timeout = 60

[build.environment]
  NODE_VERSION = "20"
  NETLIFY = "true"
  # Netlify DB: Extensions → Netlify DB → copy URL into DATABASE_URL (or it maps from NETLIFY_DATABASE_URL at build).
  # Also set AUTH_SECRET, GEMINI_API_KEY, NEXT_PUBLIC_SITE_URL in the Netlify UI.

[[plugins]]
  package = "@netlify/plugin-nextjs"
